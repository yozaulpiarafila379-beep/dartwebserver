<style>
*{
    margin:0;

    box-sizing:border-box;
}

body{
    font-family: Consolas, monospace;
    background:#020617;
    color:#38bdf8;
    overflow-x:hidden;

/* BACKGROUND DNA GLOW */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;

    radial-gradient(circle at 20% 30%, rgba(56,189,248,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(34,197,94,0.15), transparent 40%);

    z-index:-2;
}

@keyframes moveBg{
    0%{ transform:translateY(0); }
    50%{ transform:translateY(-50px); }
    100%{ transform:translateY(0); }
}

/* GRID SCI-FI */
body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        to right,
        rgba(56,189,248,0.05),
        rgba(56,189,248,0.05) 1px,
        transparent 1px,
        transparent 80px
    );

}

/* MATRIX CANVAS */

<script>
// MATRIX EFFECT (VERSI HALUS BIAR TIDAK GANGGU)
const canvas = document.getElementById("matrixCanvas");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];
for(let x = 0; x < columns; x++){
    drops[x] = 1;
}

function draw(){
    ctx.fillStyle = "rgba(2,6,23,0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = fontSize + "px monospace";
    ctx.fillStyle = "#38bdf8";

    for(let i = 0; i < drops.length; i++){
        const text = letters.charAt(Math.floor(Math.random()*letters.length));
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }
        drops[i]++;
    }
}

setInterval(draw, 40);
</script>
