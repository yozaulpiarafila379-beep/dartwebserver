<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker Identity System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Courier New', monospace;
    background:#010409;
    color:#00eaff;
    overflow:hidden;
}

/* GRID */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,234,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,234,255,0.05) 1px, transparent 1px);
    background-size:50px 50px;
}

/* SCANLINE */
.scanline{
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        to bottom,
        rgba(0,234,255,0.05),
        rgba(0,234,255,0.05) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
}

/* TERMINAL */
.terminal{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:80%;
    max-width:600px;
    padding:20px;
    border:1px solid #00eaff;
    background:rgba(0,0,0,0.8);
    box-shadow:0 0 15px #00eaff;
}

/* TEXT LINE */
.line{
    font-size:14px;
    margin:5px 0;
    white-space:nowrap;
    overflow:hidden;
    border-right:2px solid #00eaff;
    width:0;
}

/* TYPING */
@keyframes typing{
    from{ width:0; }
    to{ width:100%; }
}

@keyframes blink{
    50%{ border-color:transparent; }
}

/* ANIMATION */
.line:nth-child(1){ animation:typing 2s steps(40) forwards, blink 0.7s infinite; }
.line:nth-child(2){ animation:typing 2s steps(40) forwards 2s, blink 0.7s infinite; }
.line:nth-child(3){ animation:typing 2s steps(40) forwards 4s, blink 0.7s infinite; }
.line:nth-child(4){ animation:typing 2s steps(40) forwards 6s, blink 0.7s infinite; }
.line:nth-child(5){ animation:typing 2s steps(40) forwards 8s, blink 0.7s infinite; }

/* SUCCESS */
.success{
    color:#00eaff;
    margin-top:10px;
    opacity:0;
    animation:show 1s forwards 10s;
}

@keyframes show{
    to{ opacity:1; }
}
</style>
</head>

<body>

<div class="scanline"></div>

<div class="terminal">
    <div class="line">> Initializing system...</div>
    <div class="line">> Connecting to secure server...</div>
    <div class="line">> Decrypting user data...</div>
    <div class="line">> Nama  : Yoza Ulpia Rafila</div>
    <div class="line">> NIM   : 251410004 | Kelas : SI2A</div>

    <div class="success">✔ ACCESS GRANTED</div>
</div>

</body>
</html>
