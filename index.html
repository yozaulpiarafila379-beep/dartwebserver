<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Courier New', monospace;
    background:#010409;
    color:#00eaff;
    overflow-x:hidden;
}

/* GRID BACKGROUND */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,234,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,234,255,0.05) 1px, transparent 1px);
    background-size:50px 50px;
    z-index:-2;
}

/* RADAR SCAN EFFECT */
body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center, rgba(0,234,255,0.1), transparent 70%);
    animation:scan 6s linear infinite;
    z-index:-1;
}

@keyframes scan{
    0%{ transform:scale(0.8); opacity:0.2; }
    50%{ transform:scale(1.2); opacity:0.4; }
    100%{ transform:scale(0.8); opacity:0.2; }
}

.container{
    padding:40px;
}

/* HEADER */
.identitas{
    border:1px solid #00eaff;
    padding:20px;
    margin-bottom:30px;
    background:rgba(0,0,0,0.7);
    box-shadow:0 0 15px #00eaff;
    border-radius:8px;
}

/* TITLE */
h1{
    text-align:center;
    margin-bottom:30px;
    text-transform:uppercase;
    letter-spacing:2px;
    text-shadow:0 0 10px #00eaff;
}

/* CARD */
.dart-section{
    margin-bottom:40px;
    padding:20px;
    border:1px solid #00eaff;
    background:rgba(0,0,0,0.8);
    box-shadow:0 0 10px #00eaff;
    border-radius:8px;
    transition:0.3s;
    position:relative;
}

/* HUD CORNER EFFECT */
.dart-section::before,
.dart-section::after{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    border:2px solid #00eaff;
}

.dart-section::before{
    top:-5px;
    left:-5px;
    border-right:none;
    border-bottom:none;
}

.dart-section::after{
    bottom:-5px;
    right:-5px;
    border-left:none;
    border-top:none;
}

.dart-section:hover{
    transform:scale(1.02);
    box-shadow:0 0 25px #00eaff;
}

/* CODE */
pre{
    background:black;
    padding:15px;
    overflow-x:auto;
    color:#00eaff;
    border:1px solid #00eaff;
}

/* IFRAME */
iframe{
    width:100%;
    height:500px;
    margin-top:15px;
    border:1px solid #00eaff;
    border-radius:6px;
}

/* TERMINAL TEXT EFFECT */
h2{
    color:#00eaff;
    text-shadow:0 0 5px #00eaff;
}
</style>
</head>
