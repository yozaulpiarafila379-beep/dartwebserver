<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker OOP System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Courier New', monospace;
    background:#020617;
    color:#38bdf8;
    overflow-x:hidden;
}

/* DATA STREAM */
body::before{
    content:"010101 SYSTEM ONLINE 110010 ACCESSING DATA 010101 CONNECTED 110011 EXECUTING MODULE";
    position:fixed;
    width:200%;
    height:100%;
    color:rgba(56,189,248,0.05);
    font-size:20px;
    letter-spacing:2px;
    animation:moveData 20s linear infinite;
    z-index:-3;
}

@keyframes moveData{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}

/* GRID */
body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(56,189,248,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.05) 1px, transparent 1px);
    background-size:60px 60px;
    z-index:-2;
}

/* SCANLINE */
.scanline{
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        to bottom,
        rgba(56,189,248,0.05),
        rgba(56,189,248,0.05) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
    z-index:-1;
}

/* TOPBAR */
.topbar{
    position:fixed;
    top:0;
    width:100%;
    padding:10px;
    background:#020617;
    border-bottom:1px solid #38bdf8;
    box-shadow:0 0 10px #38bdf8;
    font-size:13px;
}

.blink{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* CONTAINER */
.container{
    padding:80px 20px;
}

/* SECTION */
.section{
    background:rgba(2,6,23,0.85);
    border:1px solid #0ea5e9;
    box-shadow:0 0 10px #38bdf8;
    margin:30px;
    padding:20px;
    border-radius:12px;
    position:relative;
}

.section::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    width:4px;
    height:100%;
    background:#38bdf8;
}

/* TITLE */
h2{
    margin-bottom:10px;
    border-right:2px solid #38bdf8;
    white-space:nowrap;
    overflow:hidden;
    animation:typing 3s steps(40), blink 0.7s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:100%}
}

/* CODE */
.code-box{
    background:black;
    border:1px solid #38bdf8;
    padding:10px;
}

/* BUTTON */
.button{
    background:black;
    color:#38bdf8;
    border:1px solid #38bdf8;
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
}

.button::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(90deg, transparent, #38bdf8, transparent);
    left:-100%;
}

.button:hover::before{
    left:100%;
    transition:0.5s;
}

.button:hover{
    box-shadow:0 0 15px #38bdf8;
}

/* IFRAME */
iframe{
    width:100%;
    height:400px;
    margin-top:10px;
    border:1px solid #38bdf8;
    border-radius:10px;
}

/* LOADER */
.loader{
    width:0%;
    height:4px;
    background:#38bdf8;
    margin-top:5px;
    box-shadow:0 0 10px #38bdf8;
}
</style>
</head>

<body>

<div class="scanline"></div>

<div class="topbar">
● SYSTEM STATUS: ONLINE <span class="blink">|</span> SECURE CONNECTION ESTABLISHED
</div>

<div class="container">

<div class="section">
<h2>1. Class Hewan</h2>

<button class="button" onclick="runDart('f1','https://dartpad.dev/embed-inline.html?id=569d91a7d55a7348d68fff15153e81f8&split=60')">
Run Program
</button>

<div class="loader" id="loader1"></div>

<iframe id="f1"></iframe>
</div>

</div>

<script>
function runDart(id, url){
    document.getElementById(id).src = url;

    let loader = document.getElementById("loader1");
    loader.style.width = "0%";

    let i = 0;
    let interval = setInterval(()=>{
        i += 10;
        loader.style.width = i + "%";
        if(i >= 100) clearInterval(interval);
    },100);
}
</script>

</body>
</html>
