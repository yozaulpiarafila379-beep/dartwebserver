<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Hacker HUD</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#010409;
    overflow:hidden;
}

/* GRID */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,234,255,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,234,255,0.08) 1px, transparent 1px);
    background-size:50px 50px;
    z-index:-3;
}

/* RADAR SCAN */
body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center, rgba(0,234,255,0.15), transparent 70%);
    animation:scan 5s linear infinite;
    z-index:-2;
}

@keyframes scan{
    0%{
        transform:scale(0.8);
        opacity:0.2;
    }
    50%{
        transform:scale(1.3);
        opacity:0.5;
    }
    100%{
        transform:scale(0.8);
        opacity:0.2;
    }
}

/* SCANLINE (LAYAR MONITOR) */
.scanline{
    position:fixed;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        to bottom,
        rgba(0,255,255,0.05),
        rgba(0,255,255,0.05) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
    z-index:-1;
}

/* GLOW HALUS */
.glow{
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,234,255,0.1), transparent 60%);
    animation:glowMove 8s infinite alternate;
    z-index:-4;
}

@keyframes glowMove{
    from{ transform:translate(-50px,-50px); }
    to{ transform:translate(50px,50px); }
}
</style>
</head>

<body>

<div class="glow"></div>
<div class="scanline"></div>

</body>
</html>
