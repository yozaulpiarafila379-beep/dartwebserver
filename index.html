<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOP - Cyberpunk Theme</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Consolas, monospace;
    background:#0a0a0a;
    color:#00ffff;
    overflow-x:hidden;
}

/* MATRIX CANVAS */
#matrixCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-2;
}

/* RAIN EFFECT */
.rain{
    position:fixed;
    width:2px;
    height:20px;
    background:linear-gradient(#00ffff, #ff00ff);
    animation:fall linear infinite;
    z-index:-1;
}

@keyframes fall{
    from{ transform:translateY(-100px); }
    to{ transform:translateY(100vh); }
}

.container{
    padding:40px;
}

.identitas{
    border:1px solid #00ffff;
    padding:20px;
    margin-bottom:30px;
    background:rgba(10,10,10,0.8);
    box-shadow:0 0 15px #ff00ff;
    border-radius:10px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    text-shadow:0 0 10px #00ffff, 0 0 20px #ff00ff;
}

.dart-section{
    margin-bottom:40px;
    padding:20px;
    border:1px solid #00ffff;
    background:rgba(10,10,10,0.85);
    box-shadow:0 0 15px #ff00ff;
    border-radius:10px;
    transition:0.3s;
}

.dart-section:hover{
    transform:scale(1.02);
    box-shadow:0 0 25px #ff00ff;
}

pre{
    background:black;
    padding:15px;
    overflow-x:auto;
    color:#00ffff;
    border:1px solid #00ffff;
}

iframe{
    width:100%;
    height:500px;
    margin-top:15px;
    border:1px solid #ff00ff;
    border-radius:10px;
}
</style>
</head>

<body>

<canvas id="matrixCanvas"></canvas>

<div class="container">

<div class="identitas">

<div class="dart-section">

</div>

<script>
// MATRIX EFFECT
const canvas = document.getElementById("matrixCanvas");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];
for(let x = 0; x < columns; x++){
    drops[x] = 1;
}

function draw(){
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = fontSize + "px monospace";

    for(let i = 0; i < drops.length; i++){
        const text = letters.charAt(Math.floor(Math.random()*letters.length));
        
        ctx.fillStyle = Math.random() > 0.5 ? "#00ffff" : "#ff00ff";
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }
        drops[i]++;
    }
}
setInterval(draw, 35);

// RAIN DROPS
function createRain(){
    const rain = document.createElement("div");
    rain.classList.add("rain");
    rain.style.left = Math.random()*window.innerWidth + "px";
    rain.style.animationDuration = (Math.random()*1 + 0.5) + "s";
    rain.style.opacity = Math.random();
    document.body.appendChild(rain);

    setTimeout(()=>{
        rain.remove();
    },1500);
}
setInterval(createRain,50);
</script>
